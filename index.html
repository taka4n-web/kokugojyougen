  }).join('');
  var sH='<div class="sc"><div class="sn">1</div><div class="ss">'+p(s[0])+'</div><div class="sm">💡 '+s[1]+'</div></div>';
  var gc=STROKES[k]!==undefined?'<div class="gc">✏️ <strong>'+STROKES[k]+'</strong>かく</div>':'';
  var pgLbl='<span class="pg-label">'+(pg+1)+'/'+(maxPg+1)+'</span>';
  r.innerHTML='<div class="rtop"><div class="bk">'+k+'</div><div class="rinfo"><div class="rreading">'+renderReading(d.r)+'</div>'+gc+'</div></div>'
    +'<div class="st"><span>📝</span>じゅくご・よく つかう ことば'+pgLbl+'</div>'
    +'<div class="wg">'+wH+'</div>'
    +'<div class="st"><span>💬</span>ぶんの なかで つかってみよう</div>'+sH
    +'<button class="upd-btn" onclick="go(true)">🔄 ちがう つかいかたを みる</button>';
  r.scrollIntoView({behavior:'smooth',block:'start'});
}
document.getElementById('ki').addEventListener('keydown',function(e){if(e.key==='Enter')go(false)});
document.getElementById('ki').addEventListener('input',function(){if(document.getElementById('ki').value.length===1)go(false)});
</script>
